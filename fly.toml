app = "golden-financier"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"

[[mounts]]
  source = "data"
  destination = "/data"

[env]
  DATABASE_PATH = "/data/finance.db"
  PORT = "8080"

[[services]]
  port = 80
  protocol = "tcp"
  internal_port = 8080

  [services.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 10

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [[services.http_checks]]
    interval = "30s"
    timeout = "5s"
    path = "/health"
    method = "GET"
